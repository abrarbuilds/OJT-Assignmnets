<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="p">India is a vast South Asian nation with a rich history and diverse culture. Home to over 1.4 billion people, it is the world's largest democracy. From the snow-capped Himalayas in the north to tropical coastlines, its varied geography perfectly mirrors its incredible "Unity in Diversity".</p>
    <button id="inc">Increase</button>
    <button id="dec">Decrease</button>
    <script>
        //         10. Text Size Adjuster
        // Problem Statement: Provide buttons to increase or decrease the font size of a paragraph.
        // Problem: Adjust font size dynamically.
        // Constraints:
        // • Define min/max size limits

        let p=document.getElementById("p")
        let inc=document.getElementById("inc")
        let dec=document.getElementById("dec")

        let size = 16;

    inc.addEventListener("click", function () {

        // maximum limit
        if (size < 32) {    
            size += 2;
            p.style.fontSize = size + "px";
        }
    });

    dec.addEventListener("click", function () {

        // minimum limit
        if (size > 10) {   
            size -= 2;
            p.style.fontSize = size + "px";
        }
    });
    </script>
</body>

</html>
