<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" placeholder="Enter Temperature in Kelvin" id="ip">
    <button id="btn">Convert</button>
    <div id="dis"></div>
    <script>
        //         19. Temperature Converter
        // Problem Statement: Convert temperature between Celsius and Fahrenheit.
        // Constraints:
        // Convert both directions
        // : Prevent invalid input

        let dis = document.getElementById("dis")
        let btn = document.getElementById("btn")

        btn.addEventListener("click", function () {
            let ip = document.getElementById("ip").value

            let final = parseFloat(ip)

            if (isNaN(final)) {
                dis.innerText = "Please enter a valid temperature.";
            }

                let fahen = (final - 273.15) * (9 / 5) + 32

                dis.innerText = `The Temperature in fahrenheit is ${fahen}`


            })
    </script>
</body>

</html>
