<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="ip">
    <div id="dis"></div>
    <script>
        //         14. Password Strength Checker
        // Problem Statement: Analyze password strength based on length and character variety.
        // Constraints:
        // • Check uppercase, numbers, symbols
        // • Show strength levels

        let ip = document.getElementById("ip")
        let dis = document.getElementById("dis")

         ip.addEventListener("input", function () {

            let password = ip.value

            let hasUpper = /[A-Z]/.test(password)
            let hasNumber = /[0-9]/.test(password)
            let hasSymbol = /[!@#$%^&*]/.test(password)

            if (password.length < 6) {
                dis.innerText = "Weak Password"
                dis.style.color = "red"
            }else if (hasUpper && hasNumber && hasSymbol) {
                dis.innerText = "Strong Password"
                dis.style.color = "green"
            }else {
                dis.innerText = "Medium Password"
                dis.style.color = "blue"
            }
        });
    </script>
</body>

</html>
