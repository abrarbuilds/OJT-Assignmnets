<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="dis"><img id="img" src="https://i.ibb.co/GfhY9qs1/ghibli.png" height="300" width="300"></div>
    <button id="btn">Hide</button>
    <script>
        //         9. Image Toggle
        // Problem Statement: Add a button to show or hide an image dynamically.
        // Problem: Show/hide image.
        // Constraints:
        // • Use style. display or class toggle

        let btn = document.getElementById("btn")
        let dis = document.getElementById("dis")
        let img = document.getElementById("img")

        btn.addEventListener("click", function () {
            if (img.style.display === "none") {
                img.style.display = "block";
                btn.innerText = "Hide";
            } else {
                img.style.display = "none";
                btn.innerText = "Show";
            }
        });
    </script>
</body>

</html>
