<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: white;
            color: black;
            transition: 0.3s;
        }

        .dark {
            background-color: black;
            color: white;
        }
        div{
            text-align: center;
            font-size: 30px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
    </style>
</head>

<body>
    <button id="btn">Toggle Mode</button>
    <div>Hi bro</div>
    <script>
        //         2. Toggle Light/Dark Mode
        // Problem Statement: Design a webpage with a button that switches between light and dark
        // themes using CSS classes.
        // Problem: Switch website theme dynamically.
        // Ul Requirements:
        // • Toggle button
        // • Visible color changes (background, text)
        // Constraints:
        // • Use classList.toggle()
        // • Maintain state during session (optional: localStorage)
        let btn = document.getElementById("btn")

        btn.addEventListener("click", function () {
            document.body.classList.toggle("dark")
        })
    </script>
</body>

</html>
