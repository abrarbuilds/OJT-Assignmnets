<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="ip" type="text" placeholder="Enter Your password">
    <button id="btn">Hide</button>
    <script>
        //         3. Show/Hide Password
        // Problem Statement: Build a password field with a checkbox or icon to toggle visibility of the
        // entered password.
        // Problem: Toggle password visibility.
        // Ul Requirements:
        // • Password input
        // • Checkbox or icon
        // Constraints:
        // Switch input type attribute
        // • No page reload
        let btn = document.getElementById("btn")
        let ip = document.getElementById("ip")


        btn.addEventListener("click", function () {
            if (ip.type === "text") {
                ip.type = "password"
                btn.textContent = "Show"
            } else {
                ip.type = "text";
                btn.innerText = "Hide";
            }
        })
    </script>
</body>

</html>
